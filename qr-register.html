<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.card{
  max-width:420px;
  margin:auto;
  background:#1e293b;
  padding:15px;
  border-radius:12px;
}

#reader{
  width:100%;
  border-radius:10px;
  overflow:hidden;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.btn-save{ background:#22c55e; color:white; }
.btn-cancel{ background:#ef4444; color:white; }

.popup{
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  width:90%;
  max-width:300px;
  z-index:9999;
}

</style>

</head>

<body>

<div class="card">

<h3>QR Scanner</h3>

<input id="radius" placeholder="Radius (meters)" value="20">

<div id="reader"></div>

<p id="status">Waiting scan...</p>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbw7mtiLRNBdcY_boO-6D--U0xwFSP7JKUelZkrvKQj64JwWuRpxgOmnO58x0AvMphV4/exec";

const statusEl = document.getElementById("status");

let scanner;

// ================= START SCANNER =================
scanner = new Html5Qrcode("reader");

scanner.start(
  { facingMode:"environment" },
  { fps:10, qrbox:250 },
  (qrText) => onScan(qrText)
);

// ================= SCAN =================
function onScan(qrText){

  statusEl.innerText = "📍 Getting GPS...";

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    statusEl.innerHTML =
      "QR: " + qrText + "<br>" +
      "Lat: " + lat + "<br>" +
      "Lng: " + lng;

    showPopup(qrText, lat, lng);

  });

}

// ================= POPUP =================
function showPopup(qr, lat, lng){

  const radius = document.getElementById("radius").value || 20;

  const box = document.createElement("div");

  box.className = "popup";

  box.innerHTML = `
    <h3>Confirm Save</h3>

    <p><b>QR:</b> ${qr}</p>
    <p><b>Lat:</b> ${lat}</p>
    <p><b>Lng:</b> ${lng}</p>
    <p><b>Radius:</b> ${radius}m</p>

    <button data-action="save">SAVE</button>
    <button data-action="cancel">CANCEL</button>
  `;

  document.body.appendChild(box);

  // ================= EVENT DELEGATION (FIX) =================
  box.addEventListener("click", function(e){

    const action = e.target.getAttribute("data-action");

    if(action === "save"){
      box.remove();
      saveQR(qr, lat, lng, radius);
    }

    if(action === "cancel"){
      box.remove();
    }

  });

}
// ================= SAVE =================
async function saveQR(qr, lat, lng, radius){

  const res = await fetch(GAS_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      action:"addQR",
      qr: qr,
      name:"SCANNED QR",
      lat: lat,
      lng: lng,
      centerLat: lat,
      centerLng: lng,
      radius: radius
    })
  });

  const data = await res.json();

  if(data.status){
    alert("✅ Saved successfully");
  } else {
    alert("❌ " + data.message);
  }

}

</script>

</body>
</html>
