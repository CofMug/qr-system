<script src="https://unpkg.com/html5-qrcode"></script>

<div style="max-width:400px;margin:auto;background:#1e293b;padding:15px;border-radius:12px;color:white">

<h3>QR Scanner</h3>

<input id="radius" placeholder="Radius (meters)" value="100">

<div id="reader"></div>

<p id="status">Waiting scan...</p>

</div>

<script>

const GAS_URL = "YOUR_GAS_URL";

const scanner = new Html5Qrcode("reader");

let lastQR = "";
let lastPos = null;

scanner.start(
  { facingMode:"environment" },
  { fps:10, qrbox:250 },
  onScan
);

// ================= SCAN =================
function onScan(qrText){

  lastQR = qrText;

  status.innerText = "📍 Getting GPS...";

  navigator.geolocation.getCurrentPosition(pos => {

    lastPos = pos;

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    status.innerHTML =
      "QR: " + qrText + "<br>" +
      "Lat: " + lat + "<br>" +
      "Lng: " + lng + "<br><br>" +
      "✔ Scan Success - Confirm Save?";

    showConfirmPopup(qrText, lat, lng);

  });

}

// ================= CONFIRM POPUP =================
function showConfirmPopup(qr, lat, lng){

  const radius = document.getElementById("radius").value || 100;

  const box = document.createElement("div");

  box.style = `
    position:fixed;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    background:#0f172a;
    color:white;
    padding:20px;
    border-radius:12px;
    width:90%;
    max-width:300px;
    z-index:9999;
    box-shadow:0 0 20px black;
  `;

  box.innerHTML = `
    <h3>Confirm Save</h3>

    <p><b>QR:</b> ${qr}</p>
    <p><b>Lat:</b> ${lat}</p>
    <p><b>Lng:</b> ${lng}</p>
    <p><b>Radius:</b> ${radius}m</p>

    <button id="saveBtn">✅ Save</button>
    <button id="cancelBtn">❌ Cancel</button>
  `;

  document.body.appendChild(box);

  // SAVE
  document.getElementById("saveBtn").onclick = async function(){

    box.remove();

    await saveQR(qr, lat, lng, radius);

  };

  // CANCEL
  document.getElementById("cancelBtn").onclick = function(){
    box.remove();
  };

}

// ================= SAVE =================
async function saveQR(qr, lat, lng, radius){

  const res = await fetch(GAS_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      action:"addQR",
      qr: qr,
      name: "SCANNED QR",
      lat: lat,
      lng: lng,
      centerLat: lat,
      centerLng: lng,
      radius: radius
    })
  });

  const data = await res.json();

  if(data.status){
    alert("✅ Saved successfully");
  } else {
    alert("❌ " + data.message);
  }

}

</script>
