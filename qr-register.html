<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR Register Scan</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:10px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  max-width:500px;
  margin:auto;
}

#reader{
  width:100%;
  border-radius:10px;
  overflow:hidden;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}
</style>

</head>

<body>

<div class="card">

<h2>📷 Scan QR to Register</h2>

<div id="reader"></div>

<p id="status">Waiting scan...</p>

<button onclick="restartScanner()">Scan Again</button>

</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbw7mtiLRNBdcY_boO-6D--U0xwFSP7JKUelZkrvKQj64JwWuRpxgOmnO58x0AvMphV4/exec";

let scanner;

// ================= START SCANNER =================
function startScanner(){

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    onScanSuccess
  );

}

startScanner();

// ================= ON SCAN =================
function onScanSuccess(qrText){

  document.getElementById("beep").play();

  status.innerHTML = "📍 Getting GPS...";

  scanner.stop();

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const timestamp = new Date().toISOString();

    status.innerHTML =
      "QR: " + qrText + "<br>" +
      "Lat: " + lat + "<br>" +
      "Lng: " + lng;

    fetch(GAS_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        action:"addQR",
        qr: qrText,
        name: "SCANNED QR",
        lat: lat,
        lng: lng,
        radius: 100
      })
    });

  });

}

// ================= RESTART =================
function restartScanner(){

  location.reload();

}

</script>

</body>
</html>
