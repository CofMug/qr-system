<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>
<link rel="stylesheet" href="style.css">

<style>

.actions{
  margin-top:15px;
  display:none;
}

.actions button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
}

.success-box{
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  white-space:pre-line;
}

</style>

</head>

<body>

<div class="card">

<h2>QR SCANNER</h2>

<div id="reader"></div>

<div class="success-box">
  <p id="result">Waiting...</p>
</div>

<div class="actions" id="actions">

  <button onclick="scanAgain()">
    Scan New
  </button>

  <button onclick="gotoLogs()">
    Go To Logs
  </button>

</div>

</div>

<!-- 🔊 BEEP -->
<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbw7mtiLRNBdcY_boO-6D--U0xwFSP7JKUelZkrvKQj64JwWuRpxgOmnO58x0AvMphV4/exec";

const user =
JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="index.html";
}

let scanner = new Html5Qrcode("reader");

// ================= START =================
startScanner();

function startScanner(){

  document.getElementById("actions").style.display = "none";

  scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    onScan
  );

}

// ================= SCAN =================
function onScan(text){

  document.getElementById("beep").play();

  scanner.stop();

  navigator.geolocation.getCurrentPosition(pos=>{

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const acc = pos.coords.accuracy;

    // GMT+8 TIME
    const now = new Date();

    const gmt8 =
      new Date(now.getTime() + (8 * 60 * 60 * 1000));

    const timestamp =
      gmt8.toISOString().replace("T"," ").substring(0,19);

    document.getElementById("result").innerText =
`
✅ Scan Successful

QR:
${text}

Latitude:
${lat}

Longitude:
${lng}

Accuracy:
${acc} meters

Time (GMT+8):
${timestamp}
`;

    fetch(GAS_URL,{
      method:"POST",
      body: JSON.stringify({
        action:"save",
        user:user.username,
        qr:text,
        lat:lat,
        lng:lng,
        accuracy:acc,
        timestamp:timestamp
      })
    });

    document.getElementById("actions").style.display =
      "block";

  });

}

// ================= BUTTONS =================
function scanAgain(){

  location.reload();

}

function gotoLogs(){

  window.location.href = "logs.html";

}

</script>

</body>
</html>
