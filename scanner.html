<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h2>QR SCANNER</h2>

<div id="reader"></div>

<p id="result">Initializing camera...</p>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbw7mtiLRNBdcY_boO-6D--U0xwFSP7JKUelZkrvKQj64JwWuRpxgOmnO58x0AvMphV4/exec";

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="index.html";
}

let scanner;

// ==========================
// WAIT FOR DOM (IMPORTANT FIX)
// ==========================
window.onload = function(){

  try{

    scanner = new Html5Qrcode("reader");

    scanner.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: 250
      },
      onScan
    ).then(() => {

      document.getElementById("result").innerText =
        "Camera started ✔";

    }).catch(err => {

      console.error(err);

      document.getElementById("result").innerText =
        "❌ Camera failed: " + err;

    });

  }catch(e){

    document.getElementById("result").innerText =
      "❌ Scanner error: " + e;

  }

};

// ==========================
// SCAN RESULT
// ==========================
function onScan(text){

  document.getElementById("result").innerText = "QR: " + text;

  // stop scanner safely
  scanner.stop().then(() => {

    navigator.geolocation.getCurrentPosition(pos=>{

      fetch(GAS_URL,{
        method:"POST",
        body: JSON.stringify({
          action:"save",
          user:user.username,
          qr:text,
          lat:pos.coords.latitude,
          lng:pos.coords.longitude,
          accuracy:pos.coords.accuracy
        })
      });

      // restart after short delay (optional)
      setTimeout(() => {
        location.reload();
      }, 1000);

    });

  }).catch(err => {
    console.log("Stop error:", err);
  });

}

</script>

</body>

</html>
