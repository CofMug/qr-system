<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h2>QR SCANNER</h2>

<div id="reader"></div>

<p id="result">Waiting...</p>

</div>

<!-- 🔊 BEEP SOUND -->
<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbw7mtiLRNBdcY_boO-6D--U0xwFSP7JKUelZkrvKQj64JwWuRpxgOmnO58x0AvMphV4/exec";

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="index.html";
}

const scanner = new Html5Qrcode("reader");

scanner.start(
  { facingMode:"environment" },
  { fps:10, qrbox:250 },
  onScan
);

// ========================
// SCAN HANDLER
// ========================
function onScan(text){

  // 🔊 PLAY BEEP
  document.getElementById("beep").play();

  // show QR result
  document.getElementById("result").innerText = "QR: " + text;

  // 🛑 STOP SCANNER after successful scan
  scanner.stop().then(() => {

    navigator.geolocation.getCurrentPosition(pos=>{

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const acc = pos.coords.accuracy;

      // show coordinates on UI (optional but useful)
      document.getElementById("result").innerText =
        "QR: " + text + "\nLat: " + lat + "\nLng: " + lng;

      // send to GAS
      fetch(GAS_URL,{
        method:"POST",
        body: JSON.stringify({
          action:"save",
          user:user.username,
          qr:text,
          lat:lat,
          lng:lng,
          accuracy:acc
        })
      });

    });

  });

}

</script>

</body>

</html>
