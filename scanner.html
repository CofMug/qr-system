<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>
<link rel="stylesheet" href="style.css">

<style>

.actions{
  margin-top:15px;
  display:none;
}

.actions button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
}

.success-box{
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  white-space:pre-line;
}

</style>

</head>

<body>

<div class="card">

<h2>QR SCANNER</h2>

<div id="reader"></div>

<div class="success-box">
  <p id="result">Waiting...</p>
</div>

<div class="actions" id="actions" style="display:none;">

  <button onclick="scanAgain()">
    Scan New
  </button>

  <button onclick="gotoLogs()">
    Go To Logs
  </button>

</div>

</div>

<!-- 🔊 BEEP -->
<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbw7mtiLRNBdcY_boO-6D--U0xwFSP7JKUelZkrvKQj64JwWuRpxgOmnO58x0AvMphV4/exec";

const user =
JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="index.html";
}

let scanner = new Html5Qrcode("reader");

// ================= START =================
startScanner();

function startScanner(){

  document.getElementById("actions").style.display = "none";

  scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    onScan
  );

}

// ================= SCAN =================
function onScan(text){

  document.getElementById("beep").play();

  scanner.stop();

  document.getElementById("result").innerHTML =
    "📍 Getting GPS location...";

  // ================= GPS =================
  navigator.geolocation.getCurrentPosition(

    // SUCCESS
    pos => {

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const acc = pos.coords.accuracy;

      // 🚨 ACCURACY CHECK
      if(acc > 100){

        document.getElementById("result").innerHTML =
        `
        ❌ GPS accuracy too weak (${Math.round(acc)}m)

        Please:
        - Turn ON GPS
        - Go outside/open area
        - Enable High Accuracy Mode
        `;

        document.getElementById("actions").style.display =
          "block";

        return;

      }

      // 🕒 GMT+8
      const timestamp =
        new Date().toLocaleString("en-PH",{
          timeZone:"Asia/Manila",
          year:"numeric",
          month:"2-digit",
          day:"2-digit",
          hour:"2-digit",
          minute:"2-digit",
          second:"2-digit",
          hour12:false
        });

      // 🗺 MAP PREVIEW
      const map =
        `https://maps.google.com/?q=${lat},${lng}`;

      // ================= DISPLAY =================
      document.getElementById("result").innerHTML =
      `
      <b>✅ Scan Successful</b><br><br>

      <b>QR:</b><br>
      ${text}<br><br>

      <b>Latitude:</b><br>
      ${lat}<br><br>

      <b>Longitude:</b><br>
      ${lng}<br><br>

      <b>Accuracy:</b><br>
      ${Math.round(acc)} meters<br><br>

      <b>Time:</b><br>
      ${timestamp}<br><br>

      <a href="${map}" target="_blank">
      Open Map
      </a>
      `;

      // ================= SAVE =================
      fetch(GAS_URL,{
        method:"POST",
        body: JSON.stringify({
          action:"save",
          user:user.username,
          qr:text,
          lat:lat,
          lng:lng,
          accuracy:acc,
          timestamp:timestamp
        })
      });

      document.getElementById("actions").style.display =
        "block";

    },

    // ERROR
    err => {

      let msg = "";

      switch(err.code){

        case 1:
          msg =
          "❌ GPS permission denied";
          break;

        case 2:
          msg =
          "❌ GPS unavailable";
          break;

        case 3:
          msg =
          "❌ GPS timeout";
          break;

        default:
          msg =
          "❌ GPS error";
      }

      document.getElementById("result").innerHTML =
        msg;

      document.getElementById("actions").style.display =
        "block";

    },

    // OPTIONS
    {
      enableHighAccuracy:true,
      timeout:10000,
      maximumAge:0
    }

  );

}
// ================= BUTTONS =================
function scanAgain(){

  location.reload();

}

function gotoLogs(){

  window.location.href = "logs.html";

}

</script>

</body>
</html>
