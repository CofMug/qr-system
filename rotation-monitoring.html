<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
  <style>
    table{
      width:100%;
      border-collapse:collapse;
      font-size:12px;
    }
    
    th,td{
      border:1px solid #334155;
      padding:8px;
      text-align:center;
    }
    
    .missed{
      background:#fff176;
      color:#b91c1c;
      font-weight:bold;
    }
    
    #summary{
      font-size:13px;
    }
  </style>
</head>
  <body>
    <div class="card">
      
      <h2>📊 Patrol Monitoring</h2>
      
      <div id="summary"></div>
      
      <input type="date" id="dateFilter">
      <button onclick="loadMonitoring()">Load</button>
      
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    
    </div>

<script>
  
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbw7mtiLRNBdcY_boO-6D--U0xwFSP7JKUelZkrvKQj64JwWuRpxgOmnO58x0AvMphV4/exec";
  
  const user =
  JSON.parse(localStorage.getItem("user"));
  
  if(!user){
    window.location.href="rotation-monitoring.html";
  }

function renderSummary(s){

  document.getElementById("summary").innerHTML = `
    <div style="background:#1e293b;padding:10px;border-radius:10px;margin-bottom:10px;">
      <b>Rotations:</b> ${s.totalRotations}<br>
      <b>QR Points:</b> ${s.totalQR}<br>
      <b>Completed:</b> ${s.completed}<br>
      <b>Missed:</b> ${s.missed}<br>
      <b>Compliance:</b> ${s.compliance}%
    </div>
  `;
}

async function loadMonitoring(){

  const res = await fetch(GAS_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      action:"monitoring",
      date: document.getElementById("dateFilter").value
    })
  });

  const data = await res.json();

  renderSummary(data.summary);
  renderTable(data);

}

function renderTable(res){

  let head = "<tr><th>QR</th>";

  res.rotations.forEach(r=>{
    head += `<th>${r}</th>`;
  });

  head += "</tr>";

  document.getElementById("thead").innerHTML = head;

  let body = "";

  res.data.forEach(row=>{

    body += "<tr>";

    body += `<td>${row.qr}</td>`;

    row.scans.forEach(s=>{
      body += `
        <td class="${s.status === 'MISS' ? 'missed' : ''}">
          ${s.time}
        </td>
      `;
    });

    body += "</tr>";

  });

  document.getElementById("tbody").innerHTML = body;

}

  
</script>
</body>
</html>
