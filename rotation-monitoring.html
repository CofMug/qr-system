<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
  <style>
    table {
      display:block;
      width: 450px;
      overflow-x:auto;
      white-space:nowrap;
    }
    
    th,td{
      border:1px solid #334155;
      padding:8px;
      text-align:center;
    }
    
    .missed{
      background:#fff176;
      color:#b91c1c;
      font-weight:bold;
    }
    
    #summary{
      font-size:13px;
    }
  </style>
</head>
  <body>
    <div class="card">
      
      <h2>📊 Patrol Monitoring</h2>
      
      <div class="filters">
      
        <input type="date" id="dateFilter">
      
        <button onclick="loadMonitoring()">
          Today Shift
        </button>
      
        <button onclick="loadYesterdayShift()">
          Yesterday Shift
        </button>
      
        <button onclick="loadAllMonitoring()">
          All Data
        </button>
      
      </div>
      
      
      <div id="summary"></div>
      
      <h3 id="shiftTitle"></h3>
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    
    </div>

<script>

const GAS_URL =
  "https://script.google.com/macros/s/AKfycbw7mtiLRNBdcY_boO-6D--U0xwFSP7JKUelZkrvKQj64JwWuRpxgOmnO58x0AvMphV4/exec";

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="rotation-monitoring.html";
}

// ================= SUMMARY =================
function renderSummary(s){

  if(!s){
    document.getElementById("summary").innerHTML =
      "<b>No data available</b>";
    return;
  }

  document.getElementById("summary").innerHTML = `
    <div style="background:#1e293b;padding:10px;border-radius:10px;margin-bottom:10px;color:white;">
      <b>Rotations:</b> ${s.totalRotations}<br>
      <b>QR Points:</b> ${s.totalQR}<br>
      <b>Completed:</b> ${s.completed}<br>
      <b>Missed:</b> ${s.missed}<br>
      <b>Compliance:</b> ${s.compliance}%
    </div>
  `;
}

// ================= LOAD =================
async function loadMonitoring(){

  const selectedDate =
    document.getElementById("dateFilter").value ||
    new Date().toISOString().split("T")[0];

  await getMonitoringData(
    selectedDate,
    "todayShift"
  );

}

async function loadYesterdayShift(){

  const d = new Date();

  d.setDate(d.getDate()-1);

  const date =
    d.toISOString().split("T")[0];

  await getMonitoringData(
    date,
    "yesterdayShift"
  );

}

async function loadAllMonitoring(){

  await getMonitoringData(
    "",
    "all"
  );

}

async function getMonitoringData(date, mode){

  const res = await fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"monitoring",
      date:date,
      mode:mode
    })
  });

  const data = await res.json();

  renderSummary(data.summary);
  renderTable(data);
  renderHeader(data);

}

// ================= TABLE =================
function renderTable(res){

  const tbody = document.getElementById("tbody");

  if(!res.data || res.data.length === 0){
    tbody.innerHTML = `
      <tr>
        <td colspan="100%">No data found</td>
      </tr>
    `;
    return;
  }

  let html = "";

  res.data.forEach(row => {

    html += `<tr>`;

    // ================= QR LABEL (FIXED) =================
    html += `<td><b>${row.qr}</b></td>`;

    // ================= SCANS =================
    row.scans.forEach(s => {

      html += `
        <td class="${s.status === 'MISS' ? 'missed' : ''}">
          ${s.time}
        </td>
      `;

    });

    html += `</tr>`;

  });

  tbody.innerHTML = html;
}

//---------------RENDER HEADER----------------------------
function renderHeader(res){

  const thead = document.getElementById("thead");

  if(!res.headers){
    thead.innerHTML = "";
    return;
  }

  let html = "<tr>";

  res.headers.forEach(h => {
    html += `<th>${h}</th>`;
  });

  html += "</tr>";

  thead.innerHTML = html;
}


window.onload = () => {
loadAllMonitoring();
renderHeader(res);
renderTable(res);
};

</script>
</body>
</html>
