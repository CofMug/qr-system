<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
  <style>
    table {
      display:block;
      overflow-x:auto;
      white-space:nowrap;
    }
    
    th,td{
      border:1px solid #334155;
      padding:8px;
      text-align:center;
    }
    
    .missed{
      background:#fff176;
      color:#b91c1c;
      font-weight:bold;
    }
    
    #summary{
      font-size:13px;
    }
  </style>
</head>
  <body>
    <div class="card">
      
      <h2>📊 Patrol Monitoring</h2>
      
      <div id="summary"></div>
      
      <input type="date" id="dateFilter">
      <button onclick="loadMonitoring()">Load</button>
      
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    
    </div>

<script>

const GAS_URL =
  "https://script.google.com/macros/s/AKfycbw7mtiLRNBdcY_boO-6D--U0xwFSP7JKUelZkrvKQj64JwWuRpxgOmnO58x0AvMphV4/exec";

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="rotation-monitoring.html";
}

// ================= SUMMARY =================
function renderSummary(s){

  if(!s){
    document.getElementById("summary").innerHTML =
      "<b>No data available</b>";
    return;
  }

  document.getElementById("summary").innerHTML = `
    <div style="background:#1e293b;padding:10px;border-radius:10px;margin-bottom:10px;color:white;">
      <b>Rotations:</b> ${s.totalRotations}<br>
      <b>QR Points:</b> ${s.totalQR}<br>
      <b>Completed:</b> ${s.completed}<br>
      <b>Missed:</b> ${s.missed}<br>
      <b>Compliance:</b> ${s.compliance}%
    </div>
  `;
}

// ================= LOAD =================
async function loadMonitoring(){

  try{

    const res = await fetch(GAS_URL,{
      method:"POST",
      body:JSON.stringify({
        action:"monitoring",
        date: document.getElementById("dateFilter").value
      })
    });

    const data = await res.json();

    if(!data.status){
      alert("Failed loading data");
      return;
    }

    renderSummary(data.summary);
    renderTable(data);

  }catch(err){
    alert("Error: " + err.message);
  }

}

// ================= TABLE =================
function renderTable(res){

  const tbody = document.getElementById("tbody");
  const thead = document.getElementById("thead");

  if(!res.data || res.data.length === 0){
    tbody.innerHTML = "<tr><td colspan='100%'>No logs found</td></tr>";
    return;
  }

  // HEADER
  let head = "<tr><th>QR</th>";

  (res.rotations || []).forEach(r=>{
    head += `<th>${r}</th>`;
  });

  head += "</tr>";
  thead.innerHTML = head;

  // BODY
  let body = "";

  res.data.forEach(row=>{

    body += "<tr>";

    // QR name
    body += `<td>${row.qr}</td>`;

    // scans
    row.scans.forEach(s=>{

      const isMiss = (s.status === "MISS" || s.status === "MISSED");

      body += `
        <td class="${isMiss ? 'missed' : ''}">
          ${s.time}
        </td>
      `;
    });

    body += "</tr>";

  });

  tbody.innerHTML = body;

}

</script>
</body>
</html>
