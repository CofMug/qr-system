<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h2>SCAN LOGS</h2>

<button onclick="load()">LOAD</button>

<table id="tbl" border="1" width="100%">
</table>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbw7mtiLRNBdcY_boO-6D--U0xwFSP7JKUelZkrvKQj64JwWuRpxgOmnO58x0AvMphV4/exec";

async function load(){

  const res = await fetch(GAS_URL,{
    method:"POST",
    body: JSON.stringify({action:"logs"})
  });

  const data = await res.json();

  let html="";

  data.data.forEach(r=>{

    html += `
      <tr>
        <td>${r[0]}</td>
        <td>${r[1]}</td>
        <td>${r[2]}</td>
        <td><a target="_blank" href="${r[6]}">Map</a></td>
      </tr>
    `;

  });

  document.getElementById("tbl").innerHTML = html;

}

load();

</script>

</body>

</html>
