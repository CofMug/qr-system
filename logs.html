<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:12px;
}

.card{
  max-width:100%;
}

.filters{
  display:grid;
  gap:10px;
  margin-bottom:15px;
}

.filters input,
.filters select,
.filters button{
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.table-wrap{
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:700px;
}

th,td{
  border:1px solid #334155;
  padding:8px;
  text-align:left;
}

th{
  background:#1e293b;
}

.qrcol{
  min-width:200px;   /* 👈 wider QR column */
  max-width:300px;
  word-break:break-word;
}

.hidden{
  display:none;
}

</style>

</head>

<body>

<div class="card">

<h2>SCAN LOGS</h2>

<!-- ADMIN PANEL -->
<div id="adminPanel">

  <div class="filters">

    <input type="date" id="dateFilter">

    <select id="userFilter">
      <option value="">All Users</option>
    </select>

    <button onclick="todayFilter()">Today</button>
    <button onclick="yesterdayFilter()">Yesterday</button>
    <button onclick="renderLogs()">Apply Filter</button>

  </div>

</div>

<!-- USER PANEL -->
<div id="userPanel" class="hidden">
  <h3>My Scan Logs</h3>
</div>

<div class="table-wrap">

<table>

<thead>
<tr>
  <th>TIME</th>
  <th>USER</th>
  <th class="qrcol">QR</th>
  <th>LAT</th>
  <th>LNG</th>
  <th>ACC</th>
  <th>MAP</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbw7mtiLRNBdcY_boO-6D--U0xwFSP7JKUelZkrvKQj64JwWuRpxgOmnO58x0AvMphV4/exec";

const user =
JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="index.html";
}

let allLogs = [];

// 👑 ROLE UI CONTROL
if(user.role !== "ADMIN"){
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("userPanel").classList.remove("hidden");
}

// ================= LOAD LOGS =================
async function loadLogs(){

  const res = await fetch(GAS_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"logs"
    })
  });

  const data = await res.json();

  if(!data.status){
    alert("Failed to load logs");
    return;
  }

  allLogs = data.data.reverse();

  populateUsers();
  renderLogs();

}

// ================= USERS DROPDOWN =================
function populateUsers(){

  const users =
    [...new Set(allLogs.map(r => r[1]))];

  let html =
    `<option value="">All Users</option>`;

  users.forEach(u=>{
    html += `<option value="${u}">${u}</option>`;
  });

  document.getElementById("userFilter").innerHTML = html;

}


function formatTime(value){

  if(!value) return "";

  const d = new Date(value);

  if(isNaN(d)) return value; // fallback if already formatted

  return d.toLocaleString("en-PH", {
    timeZone: "Asia/Manila",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: false
  });

}

// ================= RENDER LOGS =================
function renderLogs(){

  const date =
    document.getElementById("dateFilter").value;

  const selectedUser =
    document.getElementById("userFilter").value;

  let rows = allLogs;

  // 👤 NORMAL USER VIEW
  if(user.role !== "ADMIN"){
    rows = rows.filter(r => r[1] === user.username);
  }

  // 👑 ADMIN USER FILTER
  if(user.role === "ADMIN" && selectedUser){
    rows = rows.filter(r => r[1] === selectedUser);
  }

  // 📅 DATE FILTER
  if(date){
    rows = rows.filter(r =>
      String(r[0]).includes(date)
    );
  }

  let html = "";

  rows.forEach(r=>{
    html += `
      <tr>
        <td>${formatTime(r[0])}</td>
        <td>${r[1]}</td>
        <td class="qrcol">${r[2]}</td>
        <td>${r[3]}</td>
        <td>${r[4]}</td>
        <td>${r[5]}</td>
        <td>
          <a target="_blank" href="${r[6]}">Open</a>
        </td>
      </tr>
    `;
  });

  document.getElementById("tbody").innerHTML = html;

}

// ================= QUICK FILTERS =================
function todayFilter(){

  const d = new Date();

  document.getElementById("dateFilter").value =
    d.toISOString().split("T")[0];

  renderLogs();

}

function yesterdayFilter(){

  const d = new Date();
  d.setDate(d.getDate()-1);

  document.getElementById("dateFilter").value =
    d.toISOString().split("T")[0];

  renderLogs();

}

loadLogs();

</script>

</body>
</html>
